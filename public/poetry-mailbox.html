    const { useState, useEffect, useRef } = React;

    // --- PROCEDURAL AUDIO SYNTHESIZERS (ZERO-LATENCY, CLIENT-SIDE) ---
    const getAudioContext = () => {
      try {
        const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtxClass) return null;
        if (!window.__globalAudioCtx) {
          window.__globalAudioCtx = new AudioCtxClass();
        }
        const ctx = window.__globalAudioCtx;
        if (ctx.state === 'suspended') {
          ctx.resume().catch(() => {});
        }
        return ctx;
      } catch (e) {
        console.warn('AudioContext failed:', e);
        return null;
      }
    };

    // Synthesize Paper Creasing & Folding Sound ("krff-shhht-flpp")
    const playPaperFoldSound = () => {
      const ctx = getAudioContext();
      if (!ctx) return;
      const now = ctx.currentTime;
      const bufferSize = ctx.sampleRate * 0.4;
      const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }

      // 1. Fiber snapping noise
      const src1 = ctx.createBufferSource();
      src1.buffer = noiseBuffer;
      const filter1 = ctx.createBiquadFilter();
      filter1.type = 'highpass';
      filter1.frequency.setValueAtTime(1800, now);
      filter1.frequency.linearRampToValueAtTime(1200, now + 0.15);
      const gain1 = ctx.createGain();
      gain1.gain.setValueAtTime(0.001, now);
      gain1.gain.linearRampToValueAtTime(0.06, now + 0.02);
      gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
      src1.connect(filter1).connect(gain1).connect(ctx.destination);
      src1.start(now);
      src1.stop(now + 0.15);

      // 2. Creasing slide noise
      const src2 = ctx.createBufferSource();
      src2.buffer = noiseBuffer;
      const filter2 = ctx.createBiquadFilter();
      filter2.type = 'bandpass';
      filter2.Q.setValueAtTime(5.0, now);
      filter2.frequency.setValueAtTime(900, now + 0.05);
      filter2.frequency.exponentialRampToValueAtTime(1300, now + 0.2);
      const gain2 = ctx.createGain();
      gain2.gain.setValueAtTime(0.001, now + 0.05);
      gain2.gain.linearRampToValueAtTime(0.04, now + 0.15);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.38);
      src2.connect(filter2).connect(gain2).connect(ctx.destination);
      src2.start(now + 0.05);
      src2.stop(now + 0.4);
    };

    // Synthesize Slide Paper rustle into Envelope Card slot
    const playEnvelopeInSound = () => {
      const ctx = getAudioContext();
      if (!ctx) return;
      const now = ctx.currentTime;
      const bufferSize = ctx.sampleRate * 0.6;
      const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }

      const src = ctx.createBufferSource();
      src.buffer = noiseBuffer;
      const filt = ctx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.Q.setValueAtTime(4.0, now);
      filt.frequency.setValueAtTime(500, now);
      filt.frequency.exponentialRampToValueAtTime(1000, now + 0.15);
      filt.frequency.exponentialRampToValueAtTime(600, now + 0.35);

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.001, now);
      gain.gain.linearRampToValueAtTime(0.12, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);

      src.connect(filt).connect(gain).connect(ctx.destination);
      src.start(now);
      src.stop(now + 0.5);
    };

    // Synthesize Wood keepsakes box copper locking shut thud
    const playKeepsakeBoxSound = () => {
      const ctx = getAudioContext();
      if (!ctx) return;
      const now = ctx.currentTime;

      // Click snap (Hardware latch)
      const lat = ctx.createOscillator();
      const latG = ctx.createGain();
      lat.type = 'sine';
      lat.frequency.setValueAtTime(1100, now);
      latG.gain.setValueAtTime(0.05, now);
      latG.gain.exponentialRampToValueAtTime(0.001, now + 0.015);
      lat.connect(latG).connect(ctx.destination);
      lat.start(now); lat.stop(now + 0.02);

      // Deep wood resonator thump
      const thump = ctx.createOscillator();
      const thumpG = ctx.createGain();
      thump.type = 'triangle';
      thump.frequency.setValueAtTime(150, now + 0.02);
      thump.frequency.exponentialRampToValueAtTime(60, now + 0.15);
      thumpG.gain.setValueAtTime(0.001, now + 0.02);
      thumpG.gain.linearRampToValueAtTime(0.22, now + 0.04);
      thumpG.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      thump.connect(thumpG).connect(ctx.destination);
      thump.start(now + 0.02); thump.stop(now + 0.25);
    };

    // Synthesize Mechanical Typewriter keystroke ticking
    const playTypewriterTick = (isSpace = false) => {
      const ctx = getAudioContext();
      if (!ctx) return;
      const now = ctx.currentTime;
      const sampleRate = ctx.sampleRate;
      const bufferSize = sampleRate * 0.06;
      const buffer = ctx.createBuffer(1, bufferSize, sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      
      // Space keys have a broader, woodier acoustic resonator frequency
      filter.frequency.setValueAtTime(isSpace ? 450 : 950, now);
      filter.Q.setValueAtTime(isSpace ? 2.5 : 4.5, now);

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(isSpace ? 0.09 : 0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + (isSpace ? 0.05 : 0.035));

      noise.connect(filter).connect(gain).connect(ctx.destination);
      noise.start(now);
      noise.stop(now + 0.06);

      // Add a low mechanical block resonance thump behind it
      const lowOsc = ctx.createOscillator();
      const lowGain = ctx.createGain();
      lowOsc.type = 'triangle';
      lowOsc.frequency.setValueAtTime(isSpace ? 110 : 180, now);
      lowOsc.frequency.exponentialRampToValueAtTime(45, now + 0.04);
      lowGain.gain.setValueAtTime(0.04, now);
      lowGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
      lowOsc.connect(lowGain).connect(ctx.destination);
      lowOsc.start(now);
      lowOsc.stop(now + 0.05);
    };

    // Synthesize Typewriter Roller Return Slider scrape ("krshhh-click")
    const playTypewriterReturnScrape = () => {
      const ctx = getAudioContext();
      if (!ctx) return;
      const now = ctx.currentTime;
      const bufferSize = ctx.sampleRate * 0.35;
      const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }

      const src = ctx.createBufferSource();
      src.buffer = noiseBuffer;
      const filt = ctx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.Q.setValueAtTime(5.0, now);
      filt.frequency.setValueAtTime(350, now);
      filt.frequency.exponentialRampToValueAtTime(800, now + 0.18);
      filt.frequency.exponentialRampToValueAtTime(450, now + 0.32);

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.001, now);
      gain.gain.linearRampToValueAtTime(0.1, now + 0.06);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.34);

      src.connect(filt).connect(gain).connect(ctx.destination);
      src.start(now);
      src.stop(now + 0.35);

      // Carriage clamp click at end
      const click = ctx.createOscillator();
      const clickG = ctx.createGain();
      click.type = 'sine';
      click.frequency.setValueAtTime(1400, now + 0.32);
      clickG.gain.setValueAtTime(0.08, now + 0.32);
      clickG.gain.exponentialRampToValueAtTime(0.001, now + 0.34);
      click.connect(clickG).connect(ctx.destination);
      click.start(now + 0.32); click.stop(now + 0.35);
    };

    // Synthesize Retro Metal Bell Ringing sound ("ding!")
    const playTypewriterBell = () => {
      const ctx = getAudioContext();
      if (!ctx) return;
      const now = ctx.currentTime;

      // High principal frequency & secondary mechanical dish harmonic
      const f1 = 2100;
      const f2 = 3150;

      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      const gain2 = ctx.createGain();

      osc1.frequency.setValueAtTime(f1, now);
      osc2.frequency.setValueAtTime(f2, now);

      gain1.gain.setValueAtTime(0.06, now);
      gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.7);

      gain2.gain.setValueAtTime(0.03, now);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.45);

      osc1.connect(gain1).connect(ctx.destination);
      osc2.connect(gain2).connect(ctx.destination);

      osc1.start(now); osc1.stop(now + 0.75);
      osc2.start(now); osc2.stop(now + 0.5);
    };

    const getFormattedDailyDate = () => {

      const weekdayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      const date = new Date();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const weekday = weekdayNames[date.getDay()];
      return `${month}月${day}日 · ${weekday}`;
    };

          return [];

      const synth = window.speechSynthesis;

      // Handle Category pull-out triggering typewriter
      const handlePullLetter = (categoryKey) => {
        let candidates = POEMS_DATA;
        if (categoryKey && categoryKey !== 'today') {
          candidates = POEMS_DATA.filter(p => p.category === categoryKey);
          setActiveCategory(categoryKey);
        } else {
          setActiveCategory('all');
        }

        if (!candidates.length) candidates = POEMS_DATA;
        const randomIndex = Math.floor(Math.random() * candidates.length);
        const selected = candidates[randomIndex];
        
        setCurrentLetter(selected);
        setCollectStep(0); // Reset envelope folding steps
        
        // Voice stop
        if (synth && synth.speaking) {
          synth.cancel();
          setIsWhisperReading(false);
        }

        // Trigger Audio Unlock
        getAudioContext();

        // Switch to Typewriter page
        setCurrentPhase('typewriter');
      };

      // Typewriter Finished printing trigger
      const handleTypewritingComplete = () => {
        setCurrentPhase('display');
      };

      // Speak TTS text slowly
      const triggerSpeech = (lyrics) => {
        if (!synth) return;
        if (synth.speaking) {
          synth.cancel();
          setIsWhisperReading(false);
          return;
        }

        const cleanStr = lyrics.replace(/\n/g, ', ');
        const utterance = new SpeechSynthesisUtterance(cleanStr);
        utterance.lang = 'en-US';
        utterance.rate = 0.72; // slow pacing
        utterance.pitch = 1.05;

        utterance.onstart = () => setIsWhisperReading(true);
        utterance.onend = () => setIsWhisperReading(false);
        utterance.onerror = () => setIsWhisperReading(false);

        // Find standard gentle voice package if possible
        const voices = synth.getVoices();
        const gentleVoice = voices.find(v => 
          v.lang.startsWith('en') && 
          (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Aria') || v.name.includes('Samantha'))
        );
        if (gentleVoice) utterance.voice = gentleVoice;

        synth.speak(utterance);
      };

      // Auto TTS read on detail entrance
      useEffect(() => {
        if (currentPhase === 'display') {
          const timeout = setTimeout(() => {
            triggerSpeech(currentLetter.poem);
          }, 600);
          return () => clearTimeout(timeout);
        } else {
          if (synth && synth.speaking) {
            synth.cancel();
            setIsWhisperReading(false);
          }
        }
      }, [currentPhase, currentLetter.id]);

          setIsWhisperReading(false);

          setCollectStep(2);
          playPaperFoldSound();

          setCollectStep(3);

      );
    }

    // --- SECONDARY VIEW COMPONENT: TYPEWRITER REPLICATING ORIGINAL CORE MECHANICAL NOISE ENGINE ---
    function TypewriterMachine({ poemStr, onFinish }) {
      const [printedLetters, setPrintedLetters] = useState("");
      const [isCarriageDamping, setIsCarriageDamping] = useState(false);
      const textArray = poemStr.replace(/\n/g, ' ↲ ').split(''); // represent return layout symbol with ↲
      const textIndexRef = useRef(0);
      const outputIntervalRef = useRef(null);

      // Procedural typographic wave characters popping up on hits
      const [splashes, setSplashes] = useState([]);

      const playTypewriterMechanic = (char) => {
        if (char === ' ') {
          playTypewriterTick(true);
        } else if (char === '↲' || char === '\n') {
          playTypewriterReturnScrape();
          // Add bell chime every transition feed
          playTypewriterBell();
        } else {
          playTypewriterTick(false);
        }
      };

      useEffect(() => {
        const typingDelay = 110; // average key speeds

        outputIntervalRef.current = setInterval(() => {
          if (textIndexRef.current < textArray.length) {
            const nextChar = textArray[textIndexRef.current];
            
            // Map return char back to layout newline
            const charToRender = nextChar === '↲' ? '\n' : nextChar;
            setPrintedLetters(p => p + charToRender);
            playTypewriterMechanic(nextChar);

            // Trigger mechanical splatter waves
            if (nextChar !== ' ') {
              const seedId = Math.random().toString(36).substring(4);
              const driftX = Math.random() * 60 - 30; // wider randomness
              const driftY = Math.random() * -50 - 20;
              const randomDeg = Math.random() * 30 - 15;
              const newSplash = { id: seedId, txt: nextChar === '↲' ? '🔔' : nextChar, x: driftX, y: driftY, r: randomDeg };
              setSplashes(prev => [...prev.slice(-8), newSplash]); // keep only latest 8 splash coordinates
            }

            textIndexRef.current += 1;
          } else {
            clearInterval(outputIntervalRef.current);
            setTimeout(() => {
              onFinish();
            }, 1000);
          }
        }, typingDelay);

        return () => {
          if (outputIntervalRef.current) clearInterval(outputIntervalRef.current);
        };
      }, [poemStr]);

      return (
        <div className="w-full flex-1 flex flex-col justify-between py-1 text-center select-none">
          
          <div className="w-full text-center mt-2 shrink-0">
            <span className="font-sketch font-extrabold text-[13px] text-[#A26D68] uppercase tracking-widest animate-pulse flex items-center justify-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-[#A26D68]/80 animate-ping"></span>
              Typewriter Engraving
            </span>
            <p className="text-[10px] font-serif-zh font-bold text-neutral-400 mt-1">
              打字机撞针击打中，正在为您敲墨落拓纸笺：
            </p>
          </div>

          {/* MECHANICAL WORK ENGINE VISUALIZATION (PRD 3.2) */}
          <div className="flex-1 my-6 flex flex-col justify-center items-center relative min-h-[220px]">
            
            {/* Typewriter character mechanical splatter visual container */}
            <div className="absolute top-[28%] left-1/2 -translate-x-1/2 pointer-events-none w-full h-15 overflow-visible z-20">
              {splashes.map(sp => (
                <div 
                  key={sp.id}
                  className="absolute left-1/2 -translate-x-1/2 text-lg font-serif-en font-black text-stone-900/40 select-none animate-[ping_0.6s_ease-out_forwards]"
                  style={{
                    transform: `translate(${sp.x}px, ${sp.y}px) rotate(${sp.r}deg)`
                  }}
                >
                  {sp.txt}
                </div>
              ))}
            </div>

            {/* Authentic retro mechanics model SVG outline (Image 2 representation) */}
            <div className="w-full max-w-[210px] relative pointer-events-none select-none my-2 shrink-0">
              <svg viewBox="0 0 100 80" fill="none" stroke="currentColor" strokeWidth="1.2" class="text-neutral-900 mx-auto">
                {/* Roll paper barrel cylinders */}
                <rect x="25" y="10" width="50" height="15" rx="1" fill="#FAF6EE" strokeWidth="1" />
                <line x1="20" y1="18" x2="80" y2="18" strokeWidth="2.5" />
                <circle cx="20" cy="18" r="3" fill="#171717" />
                <circle cx="80" cy="18" r="3" fill="#171717" />
                {/* Carriage body thud */}
                <rect x="18" y="24" width="64" height="32" rx="3" fill="none" />
                <rect x="28" y="28" width="44" height="20" rx="1.5" stroke="#171717" strokeDasharray="1 1" />
                {/* Typing striker key blocks linkage arm */}
                <path d="M50 48 L50 35 M45 48 L40 38 M55 48 L60 38" strokeWidth="1.2" strokeLinecap="round" />
                <rect x="12" y="56" width="76" height="16" rx="2" fill="#FAF9F5" />
                {/* Small manual keys matrix dots */}
                <circle cx="22" cy="61" r="1.5" fill="#171717" /><circle cx="32" cy="61" r="1.5" fill="#171717" /><circle cx="42" cy="61" r="1.5" fill="#171717" />
                <circle cx="52" cy="61" r="1.5" fill="#171717" /><circle cx="62" cy="61" r="1.5" fill="#171717" /><circle cx="72" cy="61" r="1.5" fill="#171717" />
                <circle cx="27" cy="67" r="1.5" fill="#171717" /><circle cx="37" cy="67" r="1.5" fill="#171717" /><circle cx="47" cy="67" r="1.5" fill="#171717" />
                <circle cx="57" cy="67" r="1.5" fill="#171717" /><circle cx="67" cy="67" r="1.5" fill="#171717" /><circle cx="77" cy="67" r="1.5" fill="#171717" />
              </svg>
              {/* Animated print indicator red light */}
              <span className="absolute bottom-5 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-red-600 animate-ping"></span>
            </div>

            {/* Typed Text board scrolling within rolling slot */}
            <div className="w-full max-w-[290px] min-h-[120px] bg-[#FAF7F0] sketch-border-sm border-neutral-800 p-4 text-left shadow-inner flex flex-col justify-end text-neutral-950 font-serif-en font-black text-[12px] tracking-wide leading-relaxed mt-2 whitespace-pre-wrap select-text">
              <div className="text-stone-400 font-mono text-[8px] border-b border-stone-200/50 pb-1 mb-2">GERMAN TYPIST MODEL. 1928 ORIGINAL OUTPUT</div>
              {printedLetters}
              <span className="w-1.5 h-4 bg-stone-900 inline-block animate-pulse ml-0.5 align-middle"></span>
            </div>

          </div>

          {/* Action shortcut skips directly to sheet paper cards (PRD 3.2) */}
          <div className="w-full text-center shrink-0 mb-2">
            <button 
              onClick={onFinish}
              className="px-6 py-2 bg-white text-[11px] font-sketch font-bold tracking-widest text-[#171717] hover:bg-neutral-50 transition-colors sketch-border-sm cursor-pointer shadow-[2.5px_2.5px_0px_#171717] active:translate-y-0.5 active:shadow-[0px_0px_0px]"
            >
              直接抽纸取出 (SKIP PRINTER) →
            </button>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
